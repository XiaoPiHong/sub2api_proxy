mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
secret: "xiaopihong123456.@"

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: redir-host
  respect-rules: true
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29

proxy-providers:
  main:
    type: http
    # TODO: Replace with your VPN subscription URL
    url: "https://speedtest.jhelbt92.tianschool.cn/api/v1/client/subscribe?token=129676996dd28fc2bbcef57156b1b4c1"
    path: ./providers/main.yaml
    interval: 3600
    health-check:
      enable: true
      interval: 300
      url: https://www.gstatic.com/generate_204

proxy-groups:
  - name: Proxy
    type: select
    use:
      - main

rules:
  - MATCH,Proxy
