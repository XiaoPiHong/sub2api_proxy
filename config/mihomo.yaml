proxy-providers:
  main:
    type: http
    url: "https://speedtest.jhelbt92.tianschool.cn/api/v1/client/subscribe?token=b20ae829b6ea8995b26a789b60757677"
    path: ./providers/main.yaml
    interval: 3600
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

proxy-groups:
  - name: "🔰 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🎯 全球直连"
      - "🚥 故障转移"
      - "🎛 负载均衡"
    use:
      - main

  - name: "♻️ 自动选择"
    type: url-test
    use:
      - main
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT
    use:
      - main

  - name: "🚥 故障转移"
    type: fallback
    use:
      - main
    url: http://www.gstatic.com/generate_204
    interval: 60

  - name: "🎛 负载均衡"
    type: load-balance
    strategy: consistent-hashing
    use:
      - main
    url: http://www.gstatic.com/generate_204
    interval: 600

  - name: "🤖 人工智能"
    type: select
    proxies:
      - "🔰 节点选择"
      - "♻️ 自动选择"
      - "🎯 全球直连"
    use:
      - main

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "🔰 节点选择"
      - "🎯 全球直连"
      - "♻️ 自动选择"
    use:
      - main

